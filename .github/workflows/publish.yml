name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build --workspaces --if-present
      - name: Remove auth token to allow OIDC publishing
        run: sed -i '/^\/\/registry.npmjs.org\/:_authToken/d' "$NPM_CONFIG_USERCONFIG"
      - name: Publish @npow/interchange-core
        run: npm publish --provenance --access public
        working-directory: packages/core
      - name: Publish @npow/interchange
        run: npm publish --provenance --access public
        working-directory: packages/interchange
